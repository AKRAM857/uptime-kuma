name: CI
on:
  push:
    branches:
       - main

  pull_requests:
    branches:
       - main
jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: ./.github/actions/setup-node
     - uses: ./.github/actions/pnpm-install
     - name: check types
       run: pnpm run tsc
