name: CI
on:
  push:
    branches:
       - master

  pull_request:
    branches:
       - master
jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: ./.github/actions/setup-node
     - uses: ./.github/actions/pnpm-install
     - name: check types
       run: pnpm run tsc
  linting:
    name: lint
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: ./.github/actions/setup-node
     - uses: ./.github/actions/pnpm-install
     - name: check linting rules
       run: pnpm run lint
  unit-test:
    name: test
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: ./.github/actions/setup-node
     - uses: ./.github/actions/pnpm-install
     - name: check linting rules
       run: pnpm run test-backend


